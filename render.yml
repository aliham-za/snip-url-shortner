databases:
  - name: snip-db
    plan: free
    databaseName: snip_production
    user: snip

services:
  - type: web
    name: snip-api
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snip-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SHORT_URL_BASE
        sync: false
